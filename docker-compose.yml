services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: devops_db
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  webapp:
    image: fceylin/devops3-app:latest
    container_name: app-webapp-1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:8081"
    environment:
      # Veritabanı bağlantı bilgileri (Uygulaman içindeki properties'i ezer)
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/devops_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update