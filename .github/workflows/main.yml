name: Devops Project 3

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [closed]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # java
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: gradle

      # permissions to gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # jar creation
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # dockerhub login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker image build and push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/robotaxi-app:latest

      # triggering the ec2
      - name: Deploy and Run on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CLOUD_HOST }}
          username: ${{ secrets.CLOUD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.CLOUD_USER }}/app
            # pull the new image from dockerhub and make it up
            docker compose pull
            docker compose up -d